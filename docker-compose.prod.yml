services:
  finance-tracker-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/finance-tracker?replicaSet=rs0&directConnection=true
      COOKIE_SECURE: "true"
    networks:
      - default
      - shared-mongo

  finance-tracker-client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    depends_on:
      - finance-tracker-server
    networks:
      - default
      - shared-edge

networks:
  shared-mongo:
    external: true
  shared-edge:
    external: true
