services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'try { rs.status().ok } catch (e) { rs.initiate().ok }'"]
      interval: 5s
      timeout: 30s
      retries: 30

volumes:
  mongo-data:
